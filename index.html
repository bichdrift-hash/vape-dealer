<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0f0f0f; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: #1c1c1c; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .tab-btn { color: #888; cursor: pointer; }
        .card { background: #1c1c1c; border-radius: 15px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid #333; }
        .btn { background: #ffcc00; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div id="home" class="page active">
    <h1>Vape Dealer</h1>
    <div class="card" onclick="showPage('catalog')"><h3>🍎 Elfliq</h3><p>Все вкусы в наличии (180 лей)</p></div>
</div>

<div id="catalog" class="page">
    <h2>Elfliq 180 MDL</h2>
    <div id="product-list"></div>
</div>

<div id="cart" class="page">
    <h2>Корзина</h2>
    <div id="cart-items"></div>
    <button class="btn" style="width:100%; margin-top:20px;" onclick="checkout()">Оформить заказ</button>
</div>

<div class="tab-bar">
    <div class="tab-btn" onclick="showPage('home')">Главная</div>
    <div class="tab-btn" onclick="showPage('cart')">Корзина</div>
</div>

<script>
    const products = [
        {n: "Яблоко Персик", e: "🍎"}, {n: "Ежевика Лимон", e: "🍇"}, 
        {n: "Голубая Малина Лед", e: "🫐"}, {n: "Черника Роза Мята", e: "🫐"}
    ];
    let cart = [];

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'cart') renderCart();
    }

    function add(name) { cart.push(name); alert(name + ' в корзине'); }

    function renderCart() {
        const div = document.getElementById('cart-items');
        div.innerHTML = cart.map(item => `<div>${item} - 180 лей</div>`).join('');
    }

    function checkout() {
        window.Telegram.WebApp.sendData(cart.join(', '));
    }

    // Инициализация каталога
    const list = document.getElementById('product-list');
    products.forEach(p => {
        list.innerHTML += `<div class="card">${p.e} ${p.n} <button class="btn" onclick="add('${p.n}')">+</button></div>`;
    });
</script>
</body>
</html>
