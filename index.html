<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vape Dealer Catalog</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --accent-color: #00ff88;
            --accent-hover: #00e575;
            --danger-color: #ff4a4a;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%);
            border-bottom: 1px solid #2a2a2a;
        }

        header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-color);
        }

        header p {
            font-size: 12px;
            color: var(--accent-color);
            margin-top: 5px;
            text-transform: uppercase;
        }

        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Кнопка "Назад" */
        .back-btn {
            display: inline-flex;
            align-items: center;
            background: #2a2a2a;
            color: var(--text-color);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.2s;
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        /* Сетка брендов (Главный экран) */
        .brands-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .brand-card {
            background: var(--container-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            text-align: center;
            border: 1px solid #2c2c2c;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .brand-card:active {
            transform: scale(0.97);
            border-color: var(--accent-color);
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            background: #2a2a2a;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent-color);
            border: 2px solid #3a3a3a;
        }

        .brand-name {
            font-size: 16px;
            font-weight: 700;
        }

        .brand-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Список товаров */
        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .product-card {
            background: var(--container-bg);
            border-radius: var(--border-radius);
            border: 1px solid #2a2a2a;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .product-img-container {
            width: 100%;
            height: 140px;
            background: #252525;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .product-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 16px;
            font-weight: 800;
            color: var(--accent-color);
            margin-top: auto;
            margin-bottom: 8px;
        }

        .add-to-cart-btn {
            background: #2a2a2a;
            color: var(--text-color);
            border: none;
            border-radius: 10px;
            padding: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .add-to-cart-btn:active {
            background: var(--accent-color);
            color: #000;
            transform: scale(0.95);
        }

        /* Детали товара (Модальное окно) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }

        .modal-content {
            background: var(--container-bg);
            width: 100%;
            max-width: 600px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 25px;
            position: relative;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #333;
            color: #fff;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-img-container {
            width: 100%;
            height: 200px;
            background: #252525;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .modal-img {
            max-height: 90%;
            object-fit: contain;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .modal-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .modal-price {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 15px;
        }

        /* Панель корзины внизу */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1e1e1e;
            border-top: 1px solid #2a2a2a;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .cart-info {
            display: flex;
            flex-direction: column;
        }

        .cart-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        .cart-total {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent-color);
        }

        .order-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .order-btn:active {
            transform: scale(0.95);
            background: var(--accent-hover);
        }

        /* Окно оформления заказа */
        .order-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .order-box {
            background: var(--container-bg);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .order-box textarea {
            width: 100%;
            height: 150px;
            background: #121212;
            color: #fff;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            margin: 15px 0;
            resize: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-group button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .copy-btn {
            background: var(--accent-color);
            color: #000;
        }

        .cancel-btn {
            background: #333;
            color: #fff;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <header>
        <h1>VAPE DEALER</h1>
        <p>Каталог и резерв товаров</p>
    </header>

    <div class="container">
        <!-- Экран 1: Выбор Брендов -->
        <div id="brands-screen">
            <h3 style="margin-bottom: 15px; font-weight: 700;">Выберите производителя:</h3>
            <div class="brands-grid">
                <!-- Бренд Elfliq -->
                <div class="brand-card" onclick="openBrand('elfliq')">
                    <div class="brand-logo">💨</div>
                    <div class="brand-name">Elfliq</div>
                    <div class="brand-desc">Жидкости от Elf Bar</div>
                </div>
                <!-- Бренд 2 (Для примера) -->
                <div class="brand-card" onclick="openBrand('lostmary')">
                    <div class="brand-logo">🍓</div>
                    <div class="brand-name">Lost Mary</div>
                    <div class="brand-desc">Насыщенные вкусы</div>
                </div>
            </div>
        </div>

        <!-- Экран 2: Список вкусов бренда -->
        <div id="products-screen" class="hidden">
            <button class="back-btn" onclick="showBrandsScreen()">⬅️ К производителям</button>
            <h3 id="selected-brand-title" style="margin-bottom: 15px; font-weight: 800;">Вкусы</h3>
            <div class="products-grid" id="products-list">
                <!-- Товары рендерятся скриптом ниже -->
            </div>
        </div>
    </div>

    <!-- Модалка детальной карточки вкуса -->
    <div class="modal" id="product-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeProductModal()">✕</button>
            <div class="modal-img-container">
                <img src="" id="modal-item-img" class="modal-img" alt="">
            </div>
            <div class="modal-title" id="modal-item-title">Название</div>
            <div class="modal-desc" id="modal-item-desc">Описание вкуса</div>
            <div class="modal-price" id="modal-item-price">0 MDL</div>
            <button class="order-btn" style="width: 100%;" id="modal-add-btn">Добавить в корзину</button>
        </div>
    </div>

    <!-- Корзина снизу -->
    <div class="cart-bar" id="cart-bar">
        <div class="cart-info">
            <span class="cart-count" id="cart-count">В корзине: 0 шт.</span>
            <span class="cart-total" id="cart-total">0 MDL</span>
        </div>
        <button class="order-btn" onclick="openOrderModal()">Оформить</button>
    </div>

    <!-- Окно итогового заказа -->
    <div class="order-modal" id="order-modal">
        <div class="order-box">
            <h3>🛍️ Твой заказ готов!</h3>
            <p style="font-size: 13px; color: var(--text-muted); margin-top: 5px;">
                Скопируй текст ниже и пришли его оператору в Telegram.
            </p>
            <textarea id="order-text-area" readonly></textarea>
            <div class="btn-group">
                <button class="cancel-btn" onclick="closeOrderModal()">Закрыть</button>
                <button class="copy-btn" onclick="copyOrderText()">Скопировать текст</button>
            </div>
        </div>
    </div>

    <script>

        if (tg) {

        }

        // БАЗА ДАННЫХ ТОВАРОВ С КАРТИНКАМИ

                {

                    img: 'https://images.unsplash.com/photo-1618897996318-5a901fa6ca71?w=300&auto=format&fit=crop'
                },
                {
                    id: 'elfliq_blueberry_rose_mint',
                    title: '🫐🌹🌱 Черника Роза Мята',

                },
                {
                    id: 'elfliq_cherry_cola',
                    title: '🍒🥤 Вишневая Кола',
                    price: 180,
                    desc: 'Классический вкус любимой газировки кола с добавлением густого, терпкого сока спелой темной вишни.',
                    img: 'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=300&auto=format&fit=crop'
                },
                {
                    id: 'elfliq_cherry_lemon_peach',
                    title: '🍒🍋🍑 Вишня Лимон Персик',
                    price: 180,
                    desc: 'Многогранный фруктово-ягодный коктейль: терпкая вишня, кислый бодрящий лимон и бархатистый сладкий персик.',

                },
                {
                    id: 'elfliq_kiwi_passion_guava',
                    title: '🥝🍹 Киви Маракуйя Гуава',
                    price: 180,
                    desc: 'Легендарный тропический взрыв: кисловатый зеленый киви, ароматная кисло-сладкая маракуйя и нежная спелая розовая гуава.',

                },
                {

                    title: '🥥🍍 Пина Колада',
                    price: 180,
                    desc: 'Аромат тропического побережья: нежные кокосовые сливки в сочетании со сладким, брызжущим соком спелого ананаса.',
                    img: 'https://images.unsplash.com/photo-1546173159-315724a31696?w=300&auto=format&fit=crop'
                },
                {
                    id: 'elfliq_pink_lemonade',
                    title: '🍋 Розовый Лимонад',
                    price: 180,
                    desc: 'Освежающий летний лимонад из спелых красных ягод и сочного лимона с идеальным балансом сладости и кислинки.',
                    img: 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=300&auto=format&fit=crop'
                },
                {
                    id: 'elfliq_strawberry_cherry_lemon',
                    title: '🍓🍒🍋 Клубника Вишня Лимон',
                    price: 180,
                    desc: 'Богатое трио: ароматная садовая клубника, глубокий вкус спелой вишни и бодрящий акцент свежего лимона.',
                    img: 'https://images.unsplash.com/photo-1501196354995-cbb51c65aaea?w=300&auto=format&fit=crop'
                }
            ],
            lostmary: [] 
        };

        let cart = {}; // Корзина вида { id: количество }
        let currentActiveProduct = null;

        // Навигация
        function openBrand(brandKey) {
            document.getElementById('brands-screen').classList.add('hidden');
            document.getElementById('products-screen').classList.remove('hidden');
            
            const brandTitle = brandKey === 'elfliq' ? 'ELFLIQ' : 'LOST MARY';
            document.getElementById('selected-brand-title').innerText = brandTitle;

            renderProducts(brandKey);
        }

        function showBrandsScreen() {
            document.getElementById('products-screen').classList.add('hidden');
            document.getElementById('brands-screen').classList.remove('hidden');
        }

        // Рендер товаров
        function renderProducts(brandKey) {
            const listContainer = document.getElementById('products-list');
            listContainer.innerHTML = '';

            const products = productsData[brandKey] || [];
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = (e) => {
                    if (!e.target.classList.contains('add-to-cart-btn')) {
                        openProductModal(p);
                    }
                };

                card.innerHTML = `
                    <div class="product-img-container">
                        <img src="${p.img}" class="product-img" alt="${p.title}">
                    </div>
                    <div class="product-info">
                        <div class="product-title">${p.title}</div>
                        <div class="product-price">${p.price} MDL</div>
                        <button class="add-to-cart-btn" onclick="addToCart('${p.id}', ${p.price}, '${p.title}')">
                            В корзину ${cart[p.id] ? `(${cart[p.id]})` : ''}
                        </button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        // Логика корзины
        function addToCart(id, price, title) {
            if (cart[id]) {
                cart[id]++;
            } else {
                cart[id] = 1;
            }
            updateCartBar();
            
            // Если открыт экран конкретного бренда, перерендерим кнопки товаров
            const activeBrand = document.getElementById('selected-brand-title').innerText.toLowerCase().replace(' ', '');
            if (activeBrand.includes('elfliq')) renderProducts('elfliq');
            if (activeBrand.includes('lostmary')) renderProducts('lostmary');

            if (currentActiveProduct && currentActiveProduct.id === id) {
                document.getElementById('modal-add-btn').innerText = `Добавить в корзину (${cart[id]})`;
            }
        }

        function updateCartBar() {
            let totalItems = 0;
            let totalPrice = 0;

            for (const id in cart) {
                const qty = cart[id];
                const product = findProductById(id);
                if (product) {
                    totalItems += qty;
                    totalPrice += product.price * qty;
                }
            }

            document.getElementById('cart-count').innerText = `В корзине: ${totalItems} шт.`;
            document.getElementById('cart-total').innerText = `${totalPrice} MDL`;
        }

        function findProductById(id) {
            for (const brand in productsData) {
                const found = productsData[brand].find(p => p.id === id);
                if (found) return found;
            }
            return null;
        }

        // Модалка товара
        function openProductModal(product) {
            currentActiveProduct = product;
            document.getElementById('modal-item-img').src = product.img;
            document.getElementById('modal-item-title').innerText = product.title;
            document.getElementById('modal-item-desc').innerText = product.desc;
            document.getElementById('modal-item-price').innerText = `${product.price} MDL`;
            
            const addBtn = document.getElementById('modal-add-btn');
            addBtn.innerText = cart[product.id] ? `Добавить в корзину (${cart[product.id]})` : 'Добавить в корзину';
            addBtn.onclick = () => addToCart(product.id, product.price, product.title);

            document.getElementById('product-modal').style.display = 'flex';
        }

        function closeProductModal() {
            document.getElementById('product-modal').style.display = 'none';
            currentActiveProduct = null;
        }

        // Оформление заказа
        function openOrderModal() {
            let orderText = "📝 НОВЫЙ РЕЗЕРВ VAPE DEALER:\n\n";
            let totalPrice = 0;
            let hasItems = false;

            for (const id in cart) {
                const qty = cart[id];
                const product = findProductById(id);
                if (product) {
                    hasItems = true;
                    orderText += `• ${product.title} x${qty} — ${product.price * qty} MDL\n`;
                    totalPrice += product.price * qty;
                }
            }

            if (!hasItems) {
                alert("Ваша корзина пуста!");
                return;
            }

            orderText += `\n💵 Итого к оплате: ${totalPrice} MDL\n`;
            orderText += "📍 Выдача: Бельцы / Кишинёв (18+)\n";
            orderText += "\nНапишите операторам @vape_dealermd или @ebywz для получения!";

            document.getElementById('order-text-area').value = orderText;
            document.getElementById('order-modal').style.display = 'flex';
        }

        function closeOrderModal() {
            document.getElementById('order-modal').style.display = 'none';
        }

        function copyOrderText() {
            const textArea = document.getElementById('order-text-area');
            textArea.select();
            textArea.setSelectionRange(0, 99999); // Для мобильных

            try {
                document.execCommand('copy');
                alert('Текст заказа скопирован! Теперь просто отправь его оператору в чат.');
            } catch (err) {
                alert('Не удалось скопировать автоматически. Пожалуйста, выделите текст и скопируйте его вручную.');
            }
        }
    </script>
</body>
</html>
