<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vape Dealer Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0;
            padding: 15px;
        }
        h2 {
            text-align: center;
            color: #2ec4b6;
        }
        .product-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 80px;
        }
        .product-card {
            border: 1px solid #333;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            background: var(--tg-theme-secondary-bg-color, #242424);
        }
        .product-title {
            font-weight: bold;
            font-size: 14px;
            margin: 8px 0;
        }
        .product-price {
            color: #2ec4b6;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .btn {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            width: 100%;
        }
        .cart-counter {
            background: #e71d36;
            color: white;
            padding: 2px 6px;
            border-radius: 50%;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h2>Vape Dealer Catalog 💨</h2>
    
    <div class="product-list" id="products">
        <!-- Товары добавятся автоматически -->
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Список товаров (можно менять вкусы и цены прямо тут)
        const products = [
            { id: 1, name: "ElfLiq - Elf Jack 30ml", price: 180 },
            { id: 2, name: "Pink Grapefruit 30ml", price: 180 },
            { id: 3, name: "Blackberry Lemon 30ml", price: 180 }
        ];

        let cart = {};
        const productsContainer = document.getElementById("products");

        products.forEach(p => {
            const card = document.createElement("div");
            card.className = "product-card";
            card.innerHTML = `
                <div class="product-title">${p.name}</div>
                <div class="product-price">${p.price} MDL</div>
                <button class="btn" onclick="addToCart(${p.id})">В корзину <span id="count-${p.id}" class="cart-counter" style="display:none;">0</span></button>
            `;
            productsContainer.appendChild(card);
        });

        window.addToCart = function(id) {
            const product = products.find(p => p.id === id);
            if (!cart[id]) {
                cart[id] = { name: product.name, price: product.price, count: 0 };
            }
            cart[id].count++;
            
            const counter = document.getElementById(`count-${id}`);
            counter.innerText = cart[id].count;
            counter.style.display = "inline-block";

            updateMainButton();
        };

        function updateMainButton() {
            let totalItems = 0;
            let totalPrice = 0;
            for (let id in cart) {
                totalItems += cart[id].count;
                totalPrice += cart[id].count * cart[id].price;
            }

            if (totalItems > 0) {
                tg.MainButton.text = `Оформить заказ: ${totalPrice} MDL (${totalItems} шт)`;
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        tg.onEvent('mainButtonClicked', function() {
            let orderSummary = "";
            let totalPrice = 0;
            for (let id in cart) {
                const item = cart[id];
                orderSummary += `• ${item.name} x${item.count} — ${item.count * item.price} MDL\n`;
                totalPrice += item.count * item.price;
            }
            orderSummary += `\n💰 Итого: ${totalPrice} MDL`;

            tg.sendData(orderSummary);
            tg.close();
        });
    </script>
</body>
</html>
