<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Vape Dealer Shop</title>
    <!-- Подключаем Telegram Web Apps SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Добро пожаловать в Vape Dealer!</h1>
    <p>Здесь будет твой каталог товаров.</p>
    
    <!-- Твоя функция здесь -->
    <script>
        function copyOrderText() {
            const orderText = document.getElementById('order-text-area').value;
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.sendData(orderText);
                tg.close();
            } else {
                const textArea = document.getElementById('order-text-area');
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert('Текст заказа скопирован!');
                } catch (err) {
                    alert('Не удалось скопировать.');
                }
            }
        }
    </script>
</body>
</html>
